<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Raindrop Sync</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup" id="popup">
  <header class="header">
    <img src="../../icons/icon32.png" alt="" class="header-icon">
    <div class="header-text">
      <h1 class="title">Raindrop Sync</h1>
      <div class="status-line">
        <span class="status-dot status-dot-idle" id="status-dot"></span>
        <span id="status-text">Loading…</span>
      </div>
      <p class="status-error" id="status-error" hidden></p>
    </div>
    <button type="button" class="icon-button" id="sync-btn" title="Sync bookmarks bar now" aria-label="Sync bookmarks bar now">
      <span id="sync-glyph" aria-hidden="true">&#8635;</span>
      <span class="spinner" id="sync-spinner" hidden></span>
    </button>
  </header>
  <p class="inline-message header-message" id="sync-message" hidden></p>

  <div class="notice" id="setup-notice" hidden>
    <p id="setup-notice-text"></p>
    <button type="button" class="link-button" id="setup-notice-link">Open settings</button>
  </div>

  <div class="content" id="content" hidden>
    <section class="section">
      <label class="section-label" for="save-name-input">Save this window as</label>
      <div class="save-row">
        <input type="text" id="save-name-input" class="text-input" autocomplete="off">
        <button type="button" class="icon-button save-action" id="save-keep"
          title="Save (keep window open)" aria-label="Save and keep the window open"></button>
        <button type="button" class="icon-button save-action" id="save-close"
          title="Save and close window" aria-label="Save and close the window"></button>
      </div>
      <p class="inline-message" id="save-message" hidden></p>
    </section>

    <section class="section">
      <p class="section-label">Saved collections <span class="section-hint">· click one to open it</span></p>
      <div class="list-spinner" id="load-spinner" hidden>
        <span class="spinner"></span>
        <span>Loading…</span>
      </div>
      <div class="workspace-list" id="workspace-list"></div>
      <p class="inline-message" id="load-message" hidden></p>
    </section>
  </div>

  <footer class="footer">
    <button type="button" class="link-button" id="settings-link">Settings</button>
  </footer>
</div>

<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-message">
    <h2 class="modal-title" id="modal-title"></h2>
    <p class="modal-message" id="modal-message"></p>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button type="button" class="btn btn-danger" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>
<script type="module" src="popup.js"></script>
</body>
</html>
